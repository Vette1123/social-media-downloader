<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Social Media Downloader">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17171d" />
      <stop offset="1" stop-color="#08080a" />
    </linearGradient>
    <linearGradient id="glyph" x1="53" y1="48" x2="127" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf" />
      <stop offset="0.5" stop-color="#22d3ee" />
      <stop offset="1" stop-color="#38bdf8" />
    </linearGradient>
  </defs>

  <!-- Full-bleed, opaque square: iOS applies its own rounded mask, and the glyph
       sits well inside the maskable safe zone for Android adaptive icons. -->
  <rect width="180" height="180" fill="url(#tile)" />

  <!-- Download-into-tray glyph -->
  <g stroke="url(#glyph)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path d="M90 48V104" />
    <path d="M62 82 90 110 118 82" />
    <path d="M53 132H127" />
  </g>
</svg>
